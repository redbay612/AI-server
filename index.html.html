def handle_query(ui):
    ui = ui.lower().strip()
    # 清理常用贅字
    clean_keyword = ui.replace("區", "").replace("店", "").replace("資訊", "").replace("停車", "").strip()

    # A. 租倉流程 (依照客戶要求)
    if any(k in ui for k in ["租", "如何租", "辦理", "手續"]):
        return """🏠 **如何租倉辦理？**\\n建議先進行線上評估：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)\\n\\n**簽約資料：**\\n- **個人戶**：準備**雙證件**及**悠遊卡**。\\n- **公司戶**：準備**商業登記表**、**負責人證件**及**悠遊卡**。\\n辦理方式：請於營業時間前往櫃檯辦理簽約。"""

    # B. 優先檢索「區域」 (例如：中山、大安、中和)
    matched_stores = [s for s in STORES_DB if clean_keyword in s['dist'].lower() or (len(clean_keyword) >= 2 and clean_keyword in s['name'].lower())]
    
    if matched_stores:
        # 如果匹配到多個據點，先列出清單
        res = f"🔍 **為您找到「{clean_keyword}」相關區域的所有據點：**\\n"
        res += "📍 包含據點：" + "、".join([s['name'] for s in matched_stores]) + "\\n\\n---\\n\\n"
        for s in matched_stores:
            res += f"🏠 **{s['name']}**\\n- 地址: {s['addr']}\\n- 停車: {s['parking']}\\n- 設備: {s['elevator']}\\n- 時間: {s['time']}\\n\\n"
        return res

    # C. 如果沒命中地點但問設施
    if any(k in ui for k in ["停車", "貨梯", "電梯", "車位"]):
        return "🚗 **收多易全台據點多設有停車場與搬運設施。**\\n請問您想查詢哪個**行政區**(如: 中山、大安、中和) 或 **特定據點**？小幫手立即報位。"

    return "🤖 您好！您可以輸入**區域名稱**(如: 文山、中正、板橋) 或 **特定店名**(如: 松山店) 獲取詳細資訊。"
