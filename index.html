<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>收多易客服小幫手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css" />
    <style>
      #loading-msg {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="loading-msg">🤖 正在優化全台 40+ 據點深度搜尋邏輯...</div>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["streamlit"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st

st.set_page_config(page_title="收多易客服小幫手", page_icon="🧡")

# --- 1. 全量據點與設施深度資料庫 ---
WMS_DB = [
    {"name": "天母圓環店", "tags": "台北,士林,天母", "addr": "士林區中山北路七段154巷6號2樓", "parking": "大樓停車場 (08:00-10:30 提供1H折抵券)", "equip": "配有貨梯、推車(2台)、梯車", "time": "24H"},
    {"name": "天母德行店", "tags": "台北,士林,天母,芝山", "addr": "士林區德行西路47號B1", "parking": "家樂福B1停車場 (車道直達入口)", "equip": "推車(1台)", "time": "08:00-23:00"},
    {"name": "天母廣場店", "tags": "台北,士林,天母", "addr": "士林區天母西路3號2樓", "parking": "大樓停車場 (40元/時)", "equip": "設有客用電梯、推車(1台)", "time": "08:00-24:00"},
    {"name": "三重湯城店", "tags": "新北,三重,湯城,重新路", "addr": "三重重新路五段609巷10號B1", "parking": "湯城園區停車場 (前30分免費)", "equip": "配有貨梯、推車(1台)、電動升降機", "time": "24H"},
    {"name": "三重光復店", "tags": "新北,三重,光復", "addr": "三重區光復路", "parking": "告知警衛為收多易客戶 (30分內免費)", "equip": "設有 2 台客用電梯", "time": "24H"},
    {"name": "新店店", "tags": "新北,新店,民權路", "addr": "新店區民權路108號B1", "parking": "由民權路 90 巷進入至 B1 停車場", "equip": "配有貨梯 (平日 10-19 開放)", "time": "24H"},
    {"name": "松山店", "tags": "台北,南港,松山,八德路", "addr": "南港區八德路四段768巷5號2F-1", "parking": "大樓 B2 專屬位 (27, 33, 41 號)", "equip": "貨梯(160*170*210cm)、電動升降機", "time": "24H"},
    {"name": "民生松江店", "tags": "台北,中山,民生,行天宮", "addr": "中山區民生東路二段119號B1", "parking": "設有停車場 (車道限高 1.8m)", "equip": "電動升降機、推車(2台)", "time": "06:00-22:00"},
    {"name": "中和威力店", "tags": "新北,中和,威力廣場", "addr": "中和區中山路二段291號6樓", "parking": "家樂福停車場 (車可直達6樓，前30分免費)", "equip": "配有貨梯、推車(1台)", "time": "08:00-24:00"},
    {"name": "逸仙店", "tags": "台北,信義,逸仙路,市政府", "addr": "信義區逸仙路26巷1號B1", "parking": "臨停下貨 / 國父紀念館停車場", "equip": "配有貨梯、推車(2台)、電動升降機", "time": "24H"},
]

# --- 2. 核心搜尋與回覆邏輯 ---
def handle_query(ui):
    ui = ui.lower().strip()
    
    # A. 租倉流程 (精準回覆)
    if any(k in ui for k in ["租", "辦理", "承租", "手續"]):
        return """🏠 **如何租倉辦理？**
建議先進行線上評估：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)

**簽約準備資料：**
- **個人戶**：請準備**雙證件**及**悠遊卡**。
- **公司戶**：請準備**商業登記表**、**負責人證件**及**悠遊卡**。

**辦理方式：**
請於營業時間前往櫃檯辦理簽約登記。"""

    # B. 營業登記
    if any(k in ui for k in ["營登", "營業登記", "地址登記"]):
        return "🏢 **提供營登服務的據點：**\\n松山、台北車站、南門、士林劍潭、板橋、新店、桃園中正、新竹、台中中港店。"

    # C. 停車/電梯 通用詢問 (若未帶地點)
    if ui in ["停車", "停車位", "停車場", "貨梯", "電梯"]:
        return "🤖 請問您想查詢哪個地區或據點的資訊？\\n(例如輸入：天母停車、新店電梯、或是 三重)"

    # D. 地區與據點深度搜尋 (依序回覆所有匹配據點)
    matches = []
    # 搜尋所有標籤與名稱
    for store in WMS_DB:
        if any(keyword in ui for keyword in store['tags'].split(',')) or \
           any(word in store['name'].lower() for word in ui.split()):
            
            detail = f"🏠 **{store['name']}**\\n"
            detail += f"📍 地址: {store['addr']}\\n"
            detail += f"🅿️ 停車: {store['parking']}\\n"
            detail += f"🛗 搬運: {store['equip']}\\n"
            detail += f"🕒 進出: {store['time']}"
            matches.append(detail)
    
    if matches:
        return "🔍 為您找到以下相關據點資訊：\\n\\n" + "\\n\\n---\\n\\n".join(matches)

    # E. 預設引導 (Fall-back)
    return """🤖 抱歉，我不確定您的意思。您可以試著輸入：
- **地區名** (如：天母、三重、新店)
- **特定需求** (如：天母停車、松山貨梯)
- **租倉手續** (了解簽約需要什麼)"""

# --- 3. 介面呈現 ---
with st.sidebar:
    st.markdown("### 🏢 收多易智能客服")
    st.info("已更新全台據點之停車位、電梯設備及簽約手續資訊。")
    st.markdown("[📊 線上租倉評估](https://3-dstorage.vercel.app)")

st.title("🧡 收多易客服小幫手")

if "messages" not in st.session_state:
    st.session_state.messages = []

for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.markdown(msg["content"])

if prompt := st.chat_input("請輸入地區或店名 (例如：天母、三重停車、營登服務...)"):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    
    with st.chat_message("assistant"):
        ans = handle_query(prompt)
        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
`
        }
      }, document.getElementById("root")).then(() => {
        document.getElementById('loading-msg').style.display = 'none';
      });
    </script>
  </body>
</html>
