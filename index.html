# --- 2. 核心搜尋引擎 ---
def handle_query(ui):
    raw_ui = ui.lower()
    # 清理常用贅字，方便匹配店名核心或地區
    clean_ui = raw_ui.replace("店", "").replace("區", "").replace("倉庫", "").replace("資訊", "").replace("查詢", "").strip()

    # A. 檢測特殊意圖 (停車/電梯)
    current_intent = None
    if any(k in raw_ui for k in ["停車", "車位", "卸貨"]): current_intent = "parking"
    if any(k in raw_ui for k in ["電梯", "貨梯", "搬運"]): current_intent = "elevator"
    
    # B. 租倉手續 (優先回覆)
    if any(k in raw_ui for k in ["租", "如何租", "手續", "辦理", "承租"]):
        return """🏠 **如何租倉辦理？**\\n建議先進行線上評估：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)\\n\\n**簽約資料：**\\n1. **個人戶**：準備**雙證件**及**悠遊卡**。\\n2. **公司戶**：準備**商業登記表**、**負責人證件**及**悠遊卡**。\\n**辦理方式：** 請於營業時間前往櫃檯辦理。"""

    # C. 搜尋邏輯 (優先匹配精確店名，再匹配區域)
    matched_stores = []
    
    # 1. 嘗試精確匹配店名 (例如 "內湖家樂福" vs "內湖")
    found_exact_store = False
    for s in STORES_DB:
        if clean_ui == s['name'].lower().replace("店",""): # 完整店名匹配
            matched_stores.append(s)
            found_exact_store = True
            break
            
    # 2. 如果沒有精確匹配，則進行區域/標籤匹配
    if not found_exact_store:
        for s in STORES_DB:
            if clean_ui in s['area'].lower() or any(tag in clean_ui for tag in s['tags']):
                # 避免重複加入
                if s not in matched_stores:
                    matched_stores.append(s)

    # D. 回覆生成
    if matched_stores:
        res = ""
        
        # 如果是精確匹配單一據點，則直接給該據點資訊
        if found_exact_store and len(matched_stores) == 1:
            s = matched_stores[0]
            res += f"🏠 **{s.get('name')} 據點資訊**\\n"
            if current_intent == "parking": res += f"🅿️ **停車**: {s.get('parking', '請洽詢')}\\n"
            elif current_intent == "elevator": res += f"🛗 **搬運**: {s.get('elevator', '請洽詢')}\\n"
            else:
                res += f"📍 **地址**: {s.get('addr', '請洽詢')}\\n"
                res += f"🕒 **時間**: {s.get('time', '請洽詢')}\\n"
                res += f"🅿️ **停車**: {s.get('parking', '請洽詢')}\\n"
                res += f"🛗 **搬運**: {s.get('elevator', '請洽詢')}\\n"
                res += f"📩 **代收**: {s.get('pkg', '請洽詢')}\\n"
                res += f"📦 **紙箱**: {s.get('box', '請洽詢')}\\n"
                res += f"✨ **其他**: {s.get('other', '無')}\\n"
            return res
        
        # 否則 (區域查詢 或 多個模糊匹配)，則先條列再詳解
        else:
            names = [s['name'] for s in matched_stores]
            res += f"🔍 **為您找到 {ui} 區域的據點：**\\n📍 " + "、".join(names) + "\\n\\n---\\n\\n"
            
            for s in matched_stores:
                res += f"🏠 **{s.get('name')}**\\n"
                if current_intent == "parking": res += f"🅿️ **停車**: {s.get('parking', '請洽詢')}\\n"
                elif current_intent == "elevator": res += f"🛗 **搬運**: {s.get('elevator', '請洽詢')}\\n"
                else:
                    res += f"📍 地址: {s.get('addr', '請洽詢')}\\n"
                    res += f"🅿️ 停車: {s.get('parking', '請洽詢')}\\n"
                    res += f"🛗 搬運: {s.get('elevator', '請洽詢')}\\n"
                    res += f"🕒 時間: {s.get('time', '請洽詢')}\\n"
                res += "\\n"
            return res

    # E. 設施通用引導 (如果沒有匹配到任何據點)
    if current_intent == "parking":
        return "🚗 **收多易全台據點多設有停車場或鄰近停車位。**\\n請問您想查詢哪個**據點**(如: 松山店) 或 **區域**(如: 內湖、南港)？"
    if current_intent == "elevator":
        return "🛗 **收多易全台據點多配有貨梯或客梯。**\\n請問您想查詢哪個**據點**(如: 中和威力店) 或 **區域**(如: 士林、中山)？"

    return "🤖 您好！您可以輸入**據點名稱**(如: 內湖家樂福店) 或 **區域名稱**(如: 內湖、南港) 來獲取詳細資訊。"
