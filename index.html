# --- 2. 核心搜尋引擎邏輯 ---
def handle_query(ui):
    ui = ui.lower().strip()
    
    # A. 租倉流程 (依照客戶要求更新)
    if any(k in ui for k in ["租", "辦理", "承租", "手續"]):
        return """🏠 **如何租倉辦理？**
建議先進行線上評估：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)

**簽約準備資料：**
1. **個人戶**：請準備**雙證件**及**悠遊卡**。
2. **公司戶**：請準備**商業登記表**、**負責人證件**及**悠遊卡**。

**辦理方式：**
請於各據點**營業時間**前往櫃檯辦理簽約登記。"""

    # B. 通用設施引導 (當沒提地點只問設施時)
    is_parking_q = any(k in ui for k in ["停車", "車位", "卸貨"])
    is_elevator_q = any(k in ui for k in ["電梯", "貨梯", "搬運"])
    
    # 提取地區關鍵字
    target_area = None
    all_areas = ["士林", "大安", "中山", "南港", "內湖", "中正", "萬華", "信義", "文山", "中和", "板橋", "新店", "三重", "土城", "新莊", "淡水", "桃園", "新竹", "台中", "台南", "高雄", "基隆"]
    for area in all_areas:
        if area in ui:
            target_area = area
            break
            
    # C. 搜尋邏輯
    matched_stores = []
    # 根據地區或店名關鍵字檢索
    for s in STORES_DB:
        if (target_area and target_area in s['area']) or \
           (ui in s['name'].lower().replace("店","")):
            matched_stores.append(s)

    # D. 回覆生成
    if matched_stores:
        res = ""
        # 1. 條列清單 (依照客戶要求)
        names = [s['name'] for s in matched_stores]
        res += f"📍 **為您找到以下相關據點：**\\n" + "、".join(names) + "\\n\\n---\\n\\n"
        
        # 2. 詳解資訊
        for s in matched_stores:
            res += f"🏠 **{s['name']}**\\n"
            res += f"📍 地址/位置: {s['addr']}\\n"
            res += f"🕒 進出時間: {s['time']}\\n"
            res += f"🅿️ 交通停車: {s['parking']}\\n"
            res += f"🛗 搬運設備: {s['equip']}\\n"
            res += f"📩 代收包裹: {s['pkg']}\\n"
            res += f"📦 紙箱包材: {s['box']}\\n"
            res += f"💰 租金範圍: {s['rent']}\\n\\n"
        return res

    # 如果僅問設施但沒匹配到地點
    if is_parking_q:
        return "🚗 **收多易全台多數據點皆設有停車場或鄰近停車位。**\\n請問您想查詢哪個**地區**(如: 大安區、中和區) 或特定的**據點**？小幫手再為您提供詳細資訊。"
    if is_elevator_q:
        return "🛗 **收多易全台多數據點皆配有貨梯或客梯方便搬運。**\\n請問您想查詢哪個**地區**(如: 士林區、中山區) 或特定的**據點**？"

    return "🤖 您好！您可以輸入**地區或店名**(如: 內湖、新竹、中和) 或詢問 **如何租倉、停車資訊、貨梯設備**。"

# --- 3. 介面呈現 ---
with st.sidebar:
    st.image("https://www.storeasy.com.tw/wp-content/themes/storeasy/images/logo.png", width=150)
    st.info("資料庫已同步 50+ 全台據點服務概覽。\\n支援分區條列檢索。")
    st.markdown("[📊 線上租倉評估](https://3-dstorage.vercel.app)")

st.title("🧡 收多易客服小幫手")

if "messages" not in st.session_state:
    st.session_state.messages = []

for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.markdown(msg["content"])

if prompt := st.chat_input("請輸入地區、店名或問題..."):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    
    with st.chat_message("assistant"):
        ans = handle_query(prompt)
        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
`
