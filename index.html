<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>收多易客服小幫手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css" />
    <style>
      #loading-msg {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="loading-msg">🤖 收多易小幫手啟動中...</div>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["streamlit"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st

# --- 1. 頁面配置 ---
st.set_page_config(page_title="收多易客服小幫手", page_icon="🧡")

# --- 2. 側邊欄與資訊 ---
with st.sidebar:
    st.markdown("### 🏢 收多易松山店")
    st.markdown("📍 **據點資訊**\\n台北市南港區八德路四段768巷5號2F-1")
    st.markdown("---")
    st.markdown("🕒 **營業時間**: 平日 10:00-19:00")
    st.markdown("📞 **客服電話**: 02-2653-3645")
    st.write("---")
    st.markdown("👉 [**📊 前往線上租倉評估**](https://3-dstorage.vercel.app)")

st.title("🧡 收多易客服小幫手")
st.markdown("##### 您的 24H 智能管家 | 專業倉儲諮詢")

# --- 3. 核心回覆邏輯 ---
def get_ai_response(user_input):
    ui = user_input.lower()
    
    # 租倉導流
    if any(k in ui for k in ["租", "流程", "辦理", "想租", "承租"]):
        return """🏠 **如何租倉？**
為了提供最精準的空間建議與報價，建議您先進行線上空間評估：
👉 [**點此開啟：線上租倉評估導引**](https://3-dstorage.vercel.app)

**租倉流程：**
1. 準備證件(個人身分證或公司大章)。
2. 簽約繳交首月租金及**兩個月押金**。
3. 領取感應卡後即可 24H 進出據點。"""

    # 貨梯設備 (優化尺寸格式)
    if any(k in ui for k in ["電梯", "貨梯", "搬運", "樓", "推車", "升降"]):
        return """📦 **搬運設備服務：**
收多易松山店備有專業搬運設施：
- **專用貨梯**：尺寸為 **135*180*205** (公分)，限重 1000 公斤。
- **電動升降機**：租用上層倉庫也能輕鬆存取物品。
- **推車**：現場免費提供推車與梯子協助搬運。"""

    # 紙箱與耗材 (優化尺寸格式)
    if any(k in ui for k in ["紙箱", "購買", "箱子", "打包"]):
        return """📦 **紙箱販售資訊：**
現場提供三種規格紙箱可供選購：
- **小型紙箱**：35*30*25 (公分) ＄45
- **中型紙箱**：48*36*32 (公分) ＄55
- **大型紙箱**：60*45*40 (公分) ＄65
*數量有限，建議事先詢問。現場亦設有簡易作業區供打包使用。*"""

    # 位置與交通
    if any(k in ui for k in ["地址", "地點", "停車", "地圖", "交通", "在哪", "車站"]):
        return """📍 **據點位置與停車：**
地址：南港區八德路四段768巷5號2F-1 (松山車站對面)。
- **停車**：大樓 B2 設有專屬位 (**27, 33, 41** 號)。
- **捷運**：松山站 4 號出口，步行 3 分鐘。
🔗 [Google 地圖開啟導航](https://maps.app.goo.gl/7PF1dey922GP5rhJ9)"""

    # 進出與時間
    if any(k in ui for k in ["時間", "24小時", "半夜", "幾點", "進出"]):
        return "🕒 **進出時間：**\\n收多易松山據點對承租客戶提供 **24小時自由進出** 服務，使用感應卡或 APP 即可開啟據點大門。"

    # 價格
    if any(k in ui for k in ["價格", "租金", "多少錢"]):
        return "💰 **租金參考：**\\n租金每月約 **$950 至 $12,640**。建議使用 [線上評估工具](https://3-dstorage.vercel.app) 獲取最準確報價。"

    return "🤖 歡迎詢問！您可以試著輸入關鍵字：**租倉流程、貨梯設備、據點地址、紙箱價格**。"

# --- 4. 聊天介面實作 ---
if "messages" not in st.session_state:
    st.session_state.messages = []

# 顯示對話紀錄
for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.markdown(msg["content"])

# 直接接收輸入 (移除中間按鈕層級)
if prompt := st.chat_input("請輸入您的問題 (例如：如何租倉、貨梯尺寸...)"):
    # 紀錄使用者問題
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    
    # 立即產生 AI 回覆
    with st.chat_message("assistant"):
        ans = get_ai_response(prompt)
        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
`
        }
      }, document.getElementById("root")).then(() => {
        document.getElementById('loading-msg').style.display = 'none';
      });
    </script>
  </body>
</html>
