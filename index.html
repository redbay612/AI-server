def handle_query(ui):
    ui = ui.lower()
    
    # A. 租倉流程 (固定更新版)
    if any(k in ui for k in ["租", "如何租", "手續", "辦理"]):
        return """🏠 **如何租倉辦理？**
建議先進行：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)

**簽約準備資料：**
- **個人戶**：請準備**雙證件**及**悠遊卡**。
- **公司戶**：請準備**商業登記表**、**負責人證件**及**悠遊卡**。

請於各據點**營業時間**前往櫃檯辦理簽約登記。"""

    # B. 地區與設施深度檢索
    matches = []
    for name, info in WMS_DB.items():
        # 檢查用戶是否問到 地點、電梯、貨梯、公車、停車、據點名稱
        if any(keyword in ui for keyword in name.lower().split()) or \
           any(tag in ui for tag in info['tags'].split(',')) or \
           (name.lower() in ui):
            
            res = f"🏠 **收多易 {name} 倉庫**\\n"
            res += f"📍 **地址**: {info['addr']}\\n"
            res += f"🕒 **時間**: {info['time']}\\n"
            res += f"🚇 **交通**: {info['transit']}\\n"
            res += f"🅿️ **停車/電梯**: {info['parking']}\\n"
            res += f"💰 **預估租金**: {info['price']}\\n"
            res += f"✨ **服務/加值**: {info['service']}"
            matches.append(res)

    if matches:
        return f"🔍 為您找到以下相關據點資訊：\\n\\n" + "\\n\\n---\\n\\n".join(matches)

    # C. 常用功能關鍵字引導

    if any(k in ui for k in ["公車", "捷運", "大眾運輸", "交通"]):
        return "🚇 **交通資訊查詢：**\\n大部分據點都在捷運站出口步行5分鐘內。\\n請問您想了解哪個據點（如：永和、板橋、南港車站）的交通方式？"

    if any(k in ui for k in ["營登", "營業登記"]):
        return "🏢 **提供營登登記的據點：**\\n民生松江、台北車站、士林劍潭、板橋、新店、桃園中正、新竹、台中中港店。"

    return "🤖 您好！您可以輸入**店名或地區**(如: 永和、天母、高雄) 或查詢 **如何租倉、停車限高、貨梯設備** 等資訊。"

if prompt := st.chat_input("請輸入地區或設備需求 (例如：中和怎麼停車？或是 貨梯尺寸？)"):

    with st.chat_message("assistant"):

        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
