<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>收多易客服小幫手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css" />
    <style>
      #loading-msg {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="loading-msg">🤖 正在配置全台據點搜尋引擎，請稍候...</div>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["streamlit"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st

st.set_page_config(page_title="收多易客服小幫手", page_icon="🧡")

# --- 1. 全台據點完整資料庫 (重點校對中山區與大安區) ---
STORES_DB = [
    # 台北市 - 中山區
    {"name": "中山店", "area": "中山區", "addr": "台北市中山區八德路二段260號11F", "parking": "中影八德大樓1F停車場 (車位66,67，限30分鐘)", "elevator": "貨梯 (160*170*210cm)", "time": "24H"},
    {"name": "民生松江店", "area": "中山區", "addr": "台北市中山區民生東路二段119號B1", "parking": "設有停車場 (車道限高 1.8m)", "elevator": "電動升降機、推車(2台)", "time": "06:00-22:00"},
    {"name": "南東店", "area": "中山區", "addr": "台北市中山區吉林路26巷34號B1", "parking": "設有卸貨區 (請平停於卸貨斜坡上勿駛入)", "elevator": "貨梯 (開放時間 07:00-22:00)", "time": "24H"},

    # 台北市 - 大安區
    {"name": "延吉店", "area": "大安區", "addr": "台北市大安區延吉街250號B1", "parking": "家樂福延吉店停車場", "elevator": "貨梯 (須平日10-19預約)", "time": "07:00-24:00"},
    {"name": "仁愛二店", "area": "大安區", "addr": "台北市大安區仁愛路四段388號B1", "parking": "家樂福超市內停車場", "elevator": "店內配有貨梯", "time": "07:00-24:00"},
    {"name": "仁愛圓環店", "area": "大安區", "addr": "台北市大安區仁愛路四段50-99號", "parking": "鄰近應安168停車場", "elevator": "推車搬運", "time": "08:00-24:00"},
    {"name": "忠孝二號店", "area": "大安區", "addr": "台北市大安區忠孝東路3段218號B1", "parking": "正義國宅停車場或路邊卸貨格", "elevator": "推車搬運", "time": "07:00-24:00"},
    {"name": "新生南店", "area": "大安區", "addr": "台北市大安區新生南路3段2號B1", "parking": "周邊停車格", "elevator": "貨梯 (須預約)", "time": "07:00-24:00"},

    # 台北市 - 南港區
    {"name": "松山店", "area": "南港區", "addr": "台北市南港區八德路四段768巷5號2F-1", "parking": "大樓 B2 專屬位 (27, 33, 41 號)", "elevator": "貨梯 (160*170*210cm)", "time": "24H"},
    {"name": "南港興華店", "area": "南港區", "addr": "台北市南港區南港路二段20巷5號B2", "parking": "全聯 B2 停車場", "elevator": "客用電梯", "time": "08:00-23:00"},
    {"name": "南港北流店", "area": "南港區", "addr": "台北市南港區南港路二段99-5號", "parking": "園區停車場", "elevator": "貨梯、電動升降機", "time": "24H"},
    {"name": "南港車站店", "area": "南港區", "addr": "台北市南港區忠孝東路七段371號B1AF", "parking": "台鐵地下停車場 B2", "elevator": "客用電梯", "time": "06:00-23:00"},

    # 新北市據點
    {"name": "板橋店", "area": "板橋區", "addr": "新北市板橋區東門街30-2號5樓之1", "parking": "大樓停車場 (每小時折抵20元)", "elevator": "配有客梯", "time": "24H"},
    {"name": "新店店", "area": "新店區", "addr": "新北市新店區民權路108號B1", "parking": "民權路 90 巷進入 B1 停車場", "elevator": "貨梯 (平日 10-19)", "time": "24H"},
    {"name": "中和威力店", "area": "中和區", "addr": "新北市中和區中山路二段291號6樓", "parking": "家樂福停車場 (車可直達6樓)", "elevator": "配有貨梯", "time": "08:00-24:00"},
]

def handle_query(ui):
    raw_ui = ui.lower().strip()
    # 定義區域關鍵字清單，用於強制觸發分區條列
    districts = ["中山", "大安", "南港", "中和", "板橋", "士林", "內湖", "新店", "三重", "土城"]
    
    # 清理掉贅字，以便比對
    clean_keyword = raw_ui.replace("區", "").replace("店", "").replace("資訊", "").replace("停車", "").replace("位", "").strip()

    # A. 租倉流程 (不變)
    if any(k in raw_ui for k in ["租", "如何租", "辦理", "手續"]):
        return """🏠 **如何租倉辦理？**\\n建議先進行線上評估：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)\\n\\n**簽約資料：**\\n1. **個人戶**：準備**雙證件**及**悠遊卡**。\\n2. **公司戶**：準備**商業登記表**、**負責人證件**及**悠遊卡**。\\n辦理請於營業時間前往櫃檯。"""

    # B. 判斷是否詢問 停車 或 設備
    is_parking_q = any(k in raw_ui for k in ["停車", "車位", "卸貨"])
    is_elevator_q = any(k in raw_ui for k in ["電梯", "貨梯", "搬運"])

    # C. 優先處理「區域查詢」邏輯
    # 如果關鍵字是地區名，則列出該地區所有據點
    target_area = None
    for d in districts:
        if d in clean_keyword:
            target_area = d + "區"
            break
            
    if target_area:
        matched_stores = [s for s in STORES_DB if target_area in s['area']]
        if matched_stores:
            res = f"🔍 **為您找到 {target_area} 的所有據點：**\\n"
            res += "📍 包含據點：" + "、".join([s['name'] for s in matched_stores]) + "\\n\\n---\\n\\n"
            for s in matched_stores:
                res += f"🏠 **{s['name']}**\\n"
                if is_parking_q:
                    res += f"🅿️ **停車**: {s['parking']}\\n"
                elif is_elevator_q:
                    res += f"🛗 **搬運**: {s['elevator']}\\n"
                else:
                    res += f"- **地址**: {s['addr']}\\n"
                    res += f"- **停車**: {s['parking']}\\n"
                    res += f"- **設備**: {s['elevator']}\\n"
                res += "\\n"
            return res

    # D. 如果不是區域查詢，嘗試匹配單一「精確店名」
    for s in STORES_DB:
        store_core_name = s['name'].replace("店","").lower()
        if store_core_name in clean_keyword:
            res = f"🏠 **{s['name']} 資訊**\\n"
            if is_parking_q:
                res += f"🅿️ **停車**: {s['parking']}\\n📍 地址: {s['addr']}"
            elif is_elevator_q:
                res += f"🛗 **搬運**: {s['elevator']}\\n📍 地址: {s['addr']}"
            else:
                res += f"📍 **地址**: {s['addr']}\\n"
                res += f"🅿️ **停車**: {s['parking']}\\n"
                res += f"🛗 **設備**: {s['elevator']}\\n"
                res += f"🕒 **進出**: {s['time']}"
            return res

    # E. 如果都沒命中但有設施意圖，則引導
    if is_parking_q:
        return "🚗 **收多易多數據點皆設有停車場。**\\n請問您想查詢哪個**區域**(如: 中山、大安) 或 **特定據點**(如: 中山店、松山店)？"

    return "🤖 您好！您可以輸入**區域名稱**(如: 中山、大安、南港) 或 **特定據點名稱** 獲取詳細資訊。"

# --- 3. 介面呈現 ---
with st.sidebar:
    st.image("https://www.storeasy.com.tw/wp-content/themes/storeasy/images/logo.png", width=150)
    st.markdown("### 🏢 全台據點管家")
    st.info("已修正區域搜尋邏輯。\\n輸入「中山區」將完整列出：中山店、民生松江店、南東店。")
    st.markdown("[📊 線上租倉評估](https://3-dstorage.vercel.app)")

st.title("🧡 收多易客服小幫手")

if "messages" not in st.session_state:
    st.session_state.messages = []

for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.markdown(msg["content"])

if prompt := st.chat_input("請輸入地區、店名或問題..."):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    
    with st.chat_message("assistant"):
        ans = handle_query(prompt)
        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
`
        }
      }, document.getElementById("root")).then(() => {
        document.getElementById('loading-msg').style.display = 'none';
      });
    </script>
  </body>
</html>
