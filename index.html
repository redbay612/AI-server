      stlite.mount({
        requirements: ["streamlit"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st

st.set_page_config(page_title="收多易客服小幫手", page_icon="🧡")

# --- 1. 全台據點完整資料庫 ---
WMS_DB = {
    "松山店": {"addr": "南港區八德路四段768巷5號2F-1", "parking": "大樓 B2 專屬位 (27, 33, 41 號)；貨車請停一樓卸貨區。", "time": "24小時自由進出", "price": "$950-$12,640", "area": "台北,南港,松山"},
    "逸仙店": {"addr": "信義區逸仙路26巷1號B1", "parking": "臨停下貨或利用國父紀念館停車場。", "time": "24小時自由進出", "price": "$620-$17,530", "area": "台北,信義,逸仙"},
    "延吉店": {"addr": "大安區延吉街250號B1", "parking": "家樂福延吉超市停車場。", "time": "07:00-24:00", "price": "$1,980-$11,680", "area": "台北,大安,延吉"},
    "仁愛二店": {"addr": "大安區仁愛路四段388號B1", "parking": "家樂福超市停車場。", "time": "07:00-24:00", "price": "$1,660-$8,700", "area": "台北,大安,仁愛"},
    "新店店": {"addr": "新店區民權路108號B1", "parking": "B1 專屬停車場、車道直達、貨梯(平日開放)。", "time": "24小時自由進出", "price": "$840-$9,520", "area": "新北,新店"},
    "永和店": {"addr": "永和區永平路82號B1", "parking": "B1 臨停卸貨、車道直達入口。", "time": "24小時自由進出", "price": "$810-$16,500", "area": "新北,永和,樂華"},
    "板橋店": {"addr": "板橋區東門街30-2號5樓之1", "parking": "大樓停車場、客梯與推車。", "time": "24小時自由進出", "price": "$1,110-$7,640", "area": "新北,板橋,府中"},
    "三重湯城店": {"addr": "三重重新路五段609巷10號B1", "parking": "湯城園區停車場、貨梯直達。", "time": "24小時自由進出", "price": "$580-$10,620", "area": "新北,三重,湯城"},
    "中和威力店": {"addr": "中和區中山路二段291號6樓", "parking": "威力廣場停車場(車可直達6樓卸貨)。", "time": "08:00-24:00", "price": "$1,760-$6,350", "area": "新北,中和,威力"},
    "桃園中正店": {"addr": "桃園區中正路366號", "parking": "大樓停車場、貨梯配合推車。", "time": "24小時自由進出", "price": "$1,500-$7,720", "area": "桃園,中正"},
    "桃園經國店": {"addr": "桃園區經國路369號", "parking": "家樂福停車場、貨梯使用。", "time": "24小時自由進出", "price": "$1,870-$7,910", "area": "桃園,經國"},
    "新竹中華店": {"addr": "東區中華路二段198號", "parking": "專屬停車場/卸貨區、車道出入、重機車位。", "time": "24小時自由進出", "price": "$890-$7,860", "area": "新竹"},
    "台中中港店": {"addr": "西區台灣大道二段16號10樓", "parking": "大樓臨時卸貨區、貨梯。 ", "time": "24小時自由進出", "price": "$720-$4,000", "area": "台中,中港"},
    "台中英士店": {"addr": "西區英士路71號", "parking": "正門口即可臨停卸貨。", "time": "24小時自由進出", "price": "$690-$6,990", "area": "台中,英士"},
    "高雄復興店": {"addr": "新興區復興一路80號4樓", "parking": "B1 停車場、客梯與梯車。", "time": "24小時自由進出", "price": "$750-$10,750", "area": "高雄,復興"},
    "高雄博愛店": {"addr": "三民區博愛一路372號9樓", "parking": "鄰近松江街停車場、客梯。 ", "time": "07:00-22:00", "price": "$1,600-$6,440", "area": "高雄,博愛"},
    "天母圓環店": {"addr": "士林區中山北路七段154巷6號2樓", "parking": "大樓停車場 (08:00-10:30開放)。", "time": "24小時自由進出", "price": "$950-$17,000", "area": "台北,士林,天母"},
    "民生松江店": {"addr": "中山區民生東路二段119號B1", "parking": "大樓停車場 (車道限高 1.8m)、車道直達。", "time": "06:00-22:00", "price": "$980-$14,710", "area": "台北,中山,民生"},
}

# --- 2. 核心邏輯處理 ---
def handle_query(ui):
    ui = ui.lower()
    
    # A. 租倉流程 (依照客戶要求更新)
    if any(k in ui for k in ["租", "如何租", "承租"]):
        return """🏠 **如何租倉辦理？**
為了提供最精準的建議，建議先進行：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)

**簽約準備資料：**
1. **個人戶**：請準備**雙證件**及**悠遊卡**。
2. **公司戶**：請準備**商業登記表**、**負責人證件**及**悠遊卡**。

**辦理方式：**
請於**營業時間**前往櫃檯辦理簽約登記。"""

    # B. 營登查詢
    if any(k in ui for k in ["營登", "營業登記"]):
        return "🏢 **提供營登登記的據點：**\\n松山、台北車站、南門、士林劍潭、板橋、新店、桃園中正、新竹、台中中港店。"

    # C. 地區/停車/據點 綜合查詢邏輯
    matches = []
    for name, info in WMS_DB.items():
        # 如果用戶輸入包含 店名 或 區域關鍵字
        if any(keyword in ui for keyword in name.replace("店","").lower().split()) or any(area in ui for area in info['area'].split(',')):
            res = f"📍 **{name}**\\n"
            res += f"- **地址**: {info['addr']}\\n"
            res += f"- **停車/卸貨**: {info['parking']}\\n"
            res += f"- **時間**: {info['time']}\\n"
            res += f"- **租金**: {info['price']}"
            matches.append(res)
    
    if matches:
        return f"🔍 為您找到以下相關據點資訊：\\n\\n" + "\\n\\n---\\n\\n".join(matches)

    # D. 專門針對停車問題 (若沒提到地點)
    if any(k in ui for k in ["停車", "卸貨", "車位"]):
        return "🚗 **請問您想查詢哪個據點的停車資訊？**\\n(例如輸入：松山停車、新店停車、台中停車)"

    return "🤖 您好！您可以輸入**地區名**(如: 台北、新店、中和、台中) 或詢問 **租倉手續、營業登記**。\\n如果是特定詢問，請加上地區，例如：**『松山停車場在哪？』**"

# --- 3. 介面呈現 ---
with st.sidebar:
    st.markdown("### 🏢 收多易智能客服")
    st.info("已更新全台據點之地址、停車及進出時間資料。")
    # 修正：改用 Markdown 連結代替 link_button
    st.markdown("[📊 線上租倉評估](https://3-dstorage.vercel.app)")

st.title("🧡 收多易客服小幫手")

if "messages" not in st.session_state:
    st.session_state.messages = []

for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.markdown(msg["content"])

if prompt := st.chat_input("請輸入地區或問題 (例如：台北有哪些倉庫？新店怎麼停車？)"):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    
    with st.chat_message("assistant"):
        ans = handle_query(prompt)
        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
`
        }
      }, document.getElementById("root")).then(() => {
        document.getElementById('loading-msg').style.display = 'none';
      });
    </script>
  </body>
