<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>收多易客服小幫手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css" />
    <style>
      #loading-msg {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="loading-msg">🤖 正在優化資料庫邏輯，請稍候...</div>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["streamlit"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st

# --- 1. 頁面配置 ---
st.set_page_config(page_title="收多易客服小幫手", page_icon="🧡")

# --- 2. 側邊欄 ---
with st.sidebar:
    st.markdown("### 🏢 收多易智能客服")
    st.info("已更新租倉規則與各店資訊檢索邏輯。")
    st.write("---")
    st.markdown("👉 [**📊 前往線上租倉評估**](https://3-dstorage.vercel.app)")

st.title("🧡 收多易客服小幫手")
st.markdown("##### 據點查詢 | 停車指南 | 24H 智能管家")

# --- 3. 核心資料庫 ---
STORES_INFO = {
    "松山": {
        "addr": "南港區八德路四段768巷5號2F-1",
        "parking": "🅿️ 大樓 B2 專屬位 (**27, 33, 41** 號)。⚠️ 由萊爾富右轉後第一個黃色網狀線左轉入地下室。",
        "time": "🕒 24小時自由進出",
        "price": "$950 - $12,640",
        "features": "貨梯(135*180*205)、代收包裹、紙箱販售"
    },
    "逸仙": { "addr": "信義區逸仙路26巷1號B1", "parking": "🅿️ 臨停下貨或國父紀念館停車場。", "time": "🕒 24小時", "price": "$620-$17,530", "features": "紅酒櫃、代收包裹" },
    "中和威力": { "addr": "中和區中山路二段291號6樓", "parking": "🅿️ 威力廣場停車場，**車輛可直達 6 樓**。", "time": "🕒 08-24:00", "price": "$1,760-$6,350", "features": "車可直達" },
    "民生松江": { "addr": "中山區民生東路二段119號B1", "parking": "🅿️ 大樓停車場，**限高 1.8m**。", "time": "🕒 06-22:00", "price": "$980-$14,710", "features": "營登登記、代收包裹" }
}

# --- 4. 邏輯處理函數 ---
def get_ai_response(user_input):
    ui = user_input.lower()
    
    # A. 租倉流程 (依照客戶要求更新)
    if any(k in ui for k in ["租", "如何租", "想租", "承租"]):
        return """🏠 **如何租倉辦理？**
為了提供最精準的建議，建議先進行：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)

**簽約準備資料：**
1. **個人戶**：請準備**雙證件**及**悠遊卡**。
2. **公司戶**：請準備**商業登記表**、**負責人證件**及**悠遊卡**。

**辦理方式：**
請於**營業時間**前往櫃檯辦理簽約登記。"""

    # B. 各店資訊 / 據點查詢 (強化關鍵字)
    if any(k in ui for k in ["據點", "各店", "哪裡有店", "地址", "店名", "查詢店"]):
        return """📍 **據點查詢指南：**
收多易在台北、新北、桃園、新竹、台中、高雄皆有據點。
您可以輸入**地區名稱**（如：松山、中和、民生、桃園）來獲取該區據點的詳細地址與停車資訊。"""

    # C. 營業登記 (強化關鍵字)
    if any(k in ui for k in ["營登", "營業登記", "地址登記", "公司登記"]):
        return """🏢 **提供營業登記服務的據點：**
目前以下據點提供營登地址登記服務：
- **台北**：松山店、台北車站店、南門店、士林劍潭店
- **新北**：板橋店、新店店、中和二號店
- **桃園/新竹/台中**：桃園中正店、新竹中華店、台中中港店
*建議先撥打 0800-458-075 確認名額。*"""

    # D. 停車/卸貨 邏輯
    if any(k in ui for k in ["停車", "卸貨", "車位", "限高"]):
        for name, data in STORES_INFO.items():
            if name.lower() in ui:
                return f"🅿️ **{name}據點停車指南：**\\n{data['parking']}"
        return "🚗 **請問您想查詢哪個據點的停車資訊？** (例如：松山停車、中和停車)"

    # E. 地區資訊檢索
    for name, data in STORES_INFO.items():
        if name.lower() in ui:
            return f"""🏠 **{name}據點資訊**
📍 **地址**: {data['addr']}
🅿️ **停車**: {data['parking']}
🕒 **時間**: {data['time']}
💰 **租金**: {data['price']}
✨ **設施**: {data['features']}"""

    # F. 預設回覆 (Fall-back)
    return "🤖 您好！您可以輸入以下關鍵字來查詢：\\n- **地區名** (如：松山、中和)\\n- **營登服務** (提供營登的據點清單)\\n- **租倉手續** (需要準備的證件)\\n- **各店資訊** (如何查詢據點)"

# --- 5. 聊天介面實作 ---
if "messages" not in st.session_state:
    st.session_state.messages = []

for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.markdown(msg["content"])

if prompt := st.chat_input("請輸入您的問題 (例如：如何租倉、營登據點有哪些？)"):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    
    with st.chat_message("assistant"):
        ans = get_ai_response(prompt)
        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
`
        }
      }, document.getElementById("root")).then(() => {
        document.getElementById('loading-msg').style.display = 'none';
      });
    </script>
  </body>
</html>
