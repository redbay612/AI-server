      stlite.mount({
        requirements: ["streamlit"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st

# --- 1. 頁面配置 ---
st.set_page_config(page_title="收多易客服小幫手", page_icon="🧡")

# --- 2. 側邊欄 ---
with st.sidebar:
    st.markdown("### 🏢 收多易智能客服")
    st.info("已整合：全台據點資訊、停車/卸貨指南、24H 進出規則、代收與營登服務。")
    st.write("---")
    st.markdown("👉 [**📊 前往線上租倉評估**](https://3-dstorage.vercel.app)")

st.title("🧡 收多易客服小幫手")
st.markdown("##### 據點查詢 | 停車指南 | 24H 智能管家")

# --- 3. 核心資料庫 (結構化數據) ---
STORES_INFO = {
    "松山": {
        "addr": "南港區八德路四段768巷5號2F-1",
        "parking": "🅿️ 大樓 B2 設有專屬位 (**27, 33, 41** 號)。貨車請停一樓卸貨區。\\n⚠️ 注意：由萊爾富右轉後第一個黃色網狀線左轉入地下室。",
        "time": "🕒 24小時自由進出",
        "price": "$950 - $12,640",
        "features": "貨梯(135*180*205)、代收包裹、免費WIFI、紙箱販售"
    },
    "逸仙": {
        "addr": "信義區逸仙路26巷1號B1",
        "parking": "🅿️ 臨停下貨或利用國父紀念館停車場。備有貨梯與電動升降機。",
        "time": "🕒 24小時自由進出",
        "price": "$620 - $17,530",
        "features": "紅酒櫃、共同空間、代收包裹、紙箱販售"
    },
    "民生松江": {
        "addr": "中山區民生東路二段119號B1",
        "parking": "🅿️ 大樓停車場，**車道限高 1.8m**。車道直達 B1，卸貨超方便。",
        "time": "🕒 06:00-22:00",
        "price": "$980 - $14,710",
        "features": "營登登記、代收包裹、紙箱販售"
    },
    "南門": {
        "addr": "中正區延平南路189號B1",
        "parking": "🅿️ 台灣聯通地下停車場，車道可直達 B1 倉庫門口。",
        "time": "🕒 24小時自由進出",
        "price": "$880 - $20,820",
        "features": "共同工作空間、營登登記、紙箱販售"
    },
    "台北車站": {
        "addr": "中正區忠孝西路一段50號B1",
        "parking": "🅿️ 建議停放於許昌街停車場，利用客用電梯及推車搬運。",
        "time": "🕒 24小時自由進出",
        "price": "$1,930 - $10,480",
        "features": "營登登記、紙箱販售"
    },
    "永和": {
        "addr": "永和區永平路82號B1",
        "parking": "🅿️ B1 設有臨停卸貨區，車道可直接出入。",
        "time": "🕒 24小時自由進出",
        "price": "$810 - $16,500",
        "features": "代收包裹、紙箱販售、電動升降機"
    },
    "中和威力": {
        "addr": "中和區中山路二段291號6樓",
        "parking": "🅿️ 威力廣場停車場，**車輛可直達 6 樓**，免換電梯，下車即抵達。",
        "time": "🕒 08:00-24:00",
        "price": "$1,760 - $6,350",
        "features": "威力廣場內、免費WIFI"
    },
    "桃園中正": {
        "addr": "桃園區中正路366號",
        "parking": "🅿️ 設有停車場，貨梯可配合推車使用。",
        "time": "🕒 24小時自由進出",
        "price": "$1,500 - $7,720",
        "features": "營登登記、代收包裹"
    },
    "高雄博愛": {
        "addr": "三民區博愛一路372號9樓",
        "parking": "🅿️ 鄰近松江街停車場，設有客梯與推車。",
        "time": "🕒 07:00-22:00",
        "price": "$1,600 - $6,440",
        "features": "代收包裹、免費WIFI"
    }
}

# --- 4. 邏輯處理函數 ---
def get_ai_response(user_input):
    ui = user_input.lower()
    
    # 特殊導航：租倉評估
    if any(k in ui for k in ["租", "評估", "流程", "想租"]):
        return """🏠 **如何租倉？**\\n建議先進行線上評估，獲取適合您的櫃型建議：\\n👉 [**線上租倉評估及導引**](https://3-dstorage.vercel.app)\\n\\n**租倉三步驟：**\\n1. 準備身分證件(個人)或大章(公司)。\\n2. 繳交首月租金與**兩個月押金**。\\n3. 領卡後即可開始使用！"""

    # 停車/卸貨專屬邏輯 (全域搜尋)
    if any(k in ui for k in ["停車", "車位", "卸貨", "限高", "貨車"]):
        found_parking = []
        for name, data in STORES_INFO.items():
            if name.lower() in ui:
                return f"🅿️ **{name}據點停車指南：**\\n{data['parking']}"
        return "🚗 **請問您想查詢哪個據點的停車資訊？**\\n(例如輸入：松山停車、中和停車、限高資訊)"

    # 地區/店名檢索
    for name, data in STORES_INFO.items():
        if name.lower() in ui:
            return f"""🏠 **{name}據點詳細資訊**
📍 **地址**: {data['addr']}
🅿️ **停車**: {data['parking']}
🕒 **時間**: {data['time']}
💰 **租金**: {data['price']}
✨ **設施**: {data['features']}"""

    # 其他功能性查詢
    if any(k in ui for k in ["營登", "地址登記"]):
        return "🏢 **提供營登登記的據點：**\\n松山、台北車站、南門、士林劍潭、板橋、新店、桃園中正、新竹、台中中港店。"
    
    if any(k in ui for k in ["代收", "包裹"]):
        return "📩 **代收包裹服務：**\\n松山、逸仙、天母圓環、民生松江、內湖、南港等據點皆有提供。"

    return "🤖 您好！您可以輸入：\\n1. **店名** (如: 松山、中和)\\n2. **功能需求** (如: 如何停車、代收包裹、租金範圍)\\n3. **租倉導引** (如: 我想租倉)"

# --- 5. 介面呈現 ---
if "messages" not in st.session_state:
    st.session_state.messages = []

for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.markdown(msg["content"])

if prompt := st.chat_input("請輸入問題 (例如：中和威力店怎麼停車？)"):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    
    with st.chat_message("assistant"):
        ans = get_ai_response(prompt)
        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
`
        }
      }, document.getElementById("root")).then(() => {
        document.getElementById('loading-msg').style.display = 'none';
      });
    </script>
  </body>
</html>
