<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Storeasy AI 客服</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["streamlit"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st

# --- 這裡就是你的「資料庫」，你可以隨時增加 {} 裡的內容 ---
faq_knowledge = [
    {
        "category": "承租流程",
        "keywords": ["租", "承租", "辦理", "手續", "簽約", "身分證", "預約"],
        "answer": "🏠 **如何承租松山店？**\\n1. **預約看倉**：建議先現場看倉確認尺寸。\\n2. **準備證件**：個人請帶身分證，公司請帶大章與營登影本。\\n3. **簽約繳費**：繳交首月租金及**兩個月押金**。\\n4. **領卡進出**：領取感應卡後即可24小時自由進出。"
    },
    {
        "category": "價格與尺寸",
        "keywords": ["價格", "多少錢", "費用", "租金", "尺寸", "大小", "坪數", "便宜", "打折"],
        "answer": "💰 **租金與尺寸說明**：\\n收納易提供多種尺寸（從小型櫃到大型倉儲都有）。\\n- **價格**：因尺寸及租期長短（半年/一年預繳）而有不同折扣。\\n- **建議**：歡迎提供您要存放的物品（如：20個箱子、一台機車），我能幫您推薦適合的空間並報價。"
    },
    {
        "category": "環境與設備",
        "keywords": ["濕度", "除濕", "發霉", "溫度", "推車", "電梯", "搬運"],
        "answer": "✨ **松山店環境優勢**：\\n- **恆溫除濕**：維持在 55%-65% 濕度，確保衣物書籍不發霉。\\n- **搬運工具**：現場免費提供推車、梯子、甚至是簡易打包工具。\\n- **貨梯**：設有大型貨梯，搬運重物非常輕鬆。"
    },
    {
        "category": "安全與時間",
        "keywords": ["時間", "進出", "24小時", "半夜", "監視器", "保全", "安全"],
        "answer": "🔒 **安全與進出規範**：\\n- **24H 進出**：您可以隨時憑感應卡進入，不受上下班時間限制。\\n- **安全保障**：全區監控錄影，並與中興保全聯防。"
    },
    {
        "category": "松山店地址",
        "keywords": ["地點", "地址", "松山", "在哪", "交通", "停車"],
        "answer": "📍 **松山店資訊**：\\n- **地址**：台北市松山區（詳細請見官網或預約後提供導航）。\\n- **停車**：門口設有臨時停車位，方便下貨。"
    }
]

def warehouse_bot_logic(user_input):
    user_input = user_input.lower()
    # 搜尋邏輯：只要用戶輸入包含任何一個關鍵字，就回傳對應答案
    for faq in faq_knowledge:
        if any(kw in user_input for kw in faq["keywords"]):
            return faq["answer"]
    
    return "🤖 抱歉，我暫時沒辦法回答這個問題。您可以試著問：\\n- 『我想承租需要帶什麼？』\\n- 『倉庫的價格怎麼算？』\\n- 『環境有除濕嗎？』"

st.title("🏢 Storeasy AI 智能管家")
st.write("您好！我是收納易松山店的小助手。")

if "messages" not in st.session_state:
    st.session_state.messages = []

for message in st.session_state.messages:
    with st.chat_message(message["role"]):
        st.markdown(message["content"])

if prompt := st.chat_input("請輸入問題..."):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    with st.chat_message("assistant"):
        response = warehouse_bot_logic(prompt)
        st.markdown(response)
    st.session_state.messages.append({"role": "assistant", "content": response})
`
        }
      }, document.getElementById("root"));
    </script>
  </body>
</html>
