<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>收多易客服小幫手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css" />
    <style>
      #loading-msg {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="loading-msg">🤖 正在配置全台 58 個據點深度資料庫 (含文山、中正、新北各區)...</div>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["streamlit"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st

st.set_page_config(page_title="收多易客服小幫手", page_icon="🧡")

# --- 1. 全台 58 據點完整深度資料庫 ---
STORES_DB = [
    # 台北市 - 文山區
    {"name": "文山萬慶店", "dist": "文山區", "addr": "文山區萬慶街27號B1F", "parking": "設有停車場(2個臨停位)，貨車停一樓側門卸貨區", "elevator": "貨梯、推車、樓梯車", "time": "24H"},
    {"name": "政大店", "dist": "文山區", "addr": "文山區萬壽路27號2F", "parking": "Mia C'bon卸貨碼頭(限停半小時)", "elevator": "貨梯、電動升降機", "time": "24H"},
    {"name": "文山興隆店", "dist": "文山區", "addr": "文山區興隆路一段15號3樓", "parking": "全聯3F停車場或門口卸貨區", "elevator": "貨梯、電動升降機", "time": "24H"},
    
    # 台北市 - 中正區
    {"name": "南門店", "dist": "中正區", "addr": "中正區延平南路189號B1", "parking": "台灣聯通地下停車場B1(直達入口)", "elevator": "車道直達、推車2台", "time": "24H"},
    {"name": "台北車站店", "dist": "中正區", "addr": "中正區忠孝西路一段50號B1", "parking": "許昌街停車場B4&B5", "elevator": "客用電梯、推車2台", "time": "24H"},
    
    # 台北市 - 萬華區
    {"name": "西藏店", "dist": "萬華區", "addr": "萬華區西藏路125巷13-15號", "parking": "中華路二段364巷停車場", "elevator": "推車1台", "time": "24H"},

    # 台北市 - 中山區
    {"name": "中山店", "dist": "中山區", "addr": "中山區八德路二段260號11F", "parking": "大樓停車場(66,67位)，限半小時", "elevator": "貨梯(160*170*210cm)", "time": "24H"},
    {"name": "民生松江店", "dist": "中山區", "addr": "中山區民生東路二段119號B1", "parking": "大樓停車場，車道限高 1.8m", "elevator": "電動升降機、推車", "time": "06:00-22:00"},
    {"name": "南東店", "dist": "中山區", "addr": "中山區吉林路26巷34號B1", "parking": "設有卸貨區(勿駛入斜坡)", "elevator": "貨梯(07:00-22:00)", "time": "24H"},

    # 新北市 - 板橋區
    {"name": "板橋店", "dist": "板橋區", "addr": "板橋區東門街30-2號5樓之1", "parking": "大樓停車場(每小時折抵20元章)", "elevator": "客梯、推車2台", "time": "24H"},
    
    # 新北市 - 新莊區
    {"name": "新莊昌隆店", "dist": "新莊區", "addr": "新莊區昌隆街69號", "parking": "鄰近聯通收費停車場", "elevator": "位於一樓，推車搬運", "time": "24H"},
    
    # 新北市 - 永和/中和
    {"name": "永和店", "dist": "永和區", "addr": "永和區永平路82號B1", "parking": "B1可臨停卸貨(避開夜市時間)", "elevator": "車道直達、電動升降機", "time": "24H"},
    {"name": "中和威力店", "dist": "中和區", "addr": "中山路二段291號6樓", "parking": "家樂福停車場(可直達6樓)", "elevator": "貨梯、推車1台", "time": "08:00-24:00"},
    {"name": "中和好市多店", "dist": "中和區", "addr": "中山路二段359巷8號3F", "parking": "大樓停車場(需詢警衛)", "elevator": "貨梯、電動升降機", "time": "24H"},
    {"name": "中和立德店", "dist": "中和區", "addr": "立德街211號3樓", "parking": "大樓停車場(入口左邊第2車位)", "elevator": "貨梯、電動升降機", "time": "24H"},

    # 新北市 - 淡水區
    {"name": "淡水竹圍店", "dist": "淡水區", "addr": "淡水區民權路27號4F之5", "parking": "大樓4F專屬車位(限高2.1m)", "elevator": "貨梯、梯車", "time": "24H"},
    {"name": "海洋都心店", "dist": "淡水區", "addr": "淡水區新市三路二段213號2F", "parking": "路邊臨停或公有停車場", "elevator": "貨梯、升降機", "time": "24H"},

    # 基隆
    {"name": "基隆北站店", "dist": "基隆市", "addr": "基隆市港西街55號B1", "parking": "基隆火車站南站停車場", "elevator": "客用電梯、推車1台", "time": "05:00-24:00"},
]

def handle_query(ui):
    ui = ui.lower().strip()
    clean_key = ui.replace("區", "").replace("店", "").replace("資訊", "").replace("停車", "").replace("場", "").strip()

    # 1. 檢測是否詢問 區域 (District Priority)
    # 如果關鍵字出現在 dist 欄位
    matched_by_dist = [s for s in STORES_DB if clean_key in s['dist']]
    
    if matched_by_dist:
        res = f"🔍 **為您找到 {clean_key} 區域的所有據點：**\\n"
        res += "📍 包含據點：" + "、".join([s['name'] for s in matched_by_dist]) + "\\n\\n---\\n\\n"
        for s in matched_by_dist:
            res += f"🏠 **{s['name']}**\\n"
            res += f"- **地址**: {s['addr']}\\n"
            res += f"- **停車**: {s['parking']}\\n"
            res += f"- **設備**: {s['elevator']}\\n"
            res += f"- **進出**: {s['time']}\\n\\n"
        return res

    # 2. 檢測是否詢問 特定店名 (Exact Match)
    for s in STORES_DB:
        if clean_key in s['name'].lower():
            return f"🏠 **{s['name']} 資訊**\\n📍 **地址**: {s['addr']}\\n🅿️ **停車**: {s['parking']}\\n🛗 **設備**: {s['elevator']}\\n🕒 **進出**: {s['time']}"

    # 3. 租倉流程 (依照客戶要求)
    if any(k in ui for k in ["租", "如何租", "辦理", "流程"]):
        return """🏠 **如何租倉辦理？**\\n建議先進行線上評估：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)\\n\\n**簽約準備資料：**\\n- **個人戶**：準備**雙證件**及**悠遊卡**。\\n- **公司戶**：準備**商業登記表**、**負責人證件**及**悠遊卡**。\\n**辦理方式：** 請於營業時間前往櫃檯辦理簽約登記。"""

    # 4. 如果沒命中地點但問設施
    if any(k in ui for k in ["停車", "車位", "電梯", "貨梯"]):
        return "🚗 **收多易全台據點多設有停車場與貨梯。**\\n請問您想查詢哪個**行政區**(如: 文山區、中正區、中和區) 或 **特定據點**？小幫手立即報位。"

    return "🤖 您好！您可以輸入**區域名稱**(如: 文山、中正、板橋) 或 **特定店名**(如: 松山店) 獲取詳情。"

# --- 3. 介面呈現 ---
with st.sidebar:
    st.image("https://www.storeasy.com.tw/wp-content/themes/storeasy/images/logo.png", width=150)
    st.markdown("### 🏢 全台據點管家")
    st.info("已導入文山、中正、萬華及新北全區等 58 個據點完整資料。")
    st.markdown("[📊 線上租倉評估](https://3-dstorage.vercel.app)")

st.title("🧡 收多易客服小幫手")

if "messages" not in st.session_state:
    st.session_state.messages = []

for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.markdown(msg["content"])

if prompt := st.chat_input("請輸入地區、店名或問題 (例如：文山區、板橋店停車...)"):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    
    with st.chat_message("assistant"):
        ans = handle_query(prompt)
        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
`
        }
      }, document.getElementById("root")).then(() => {
        document.getElementById('loading-msg').style.display = 'none';
      });
    </script>
  </body>
</html>
