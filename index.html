]

# --- 2. 搜尋邏輯 ---
def handle_query(ui):
    ui = ui.lower().strip()
    
    # 租倉流程
    if any(k in ui for k in ["租", "辦理", "承租", "手續"]):
        return """🏠 **如何租倉辦理？**\\n建議先進行線上評估：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)\\n\\n**簽約準備資料：**\\n- **個人戶**：準備雙證件及悠遊卡。\\n- **公司戶**：準備商業登記表、負責人證件及悠遊卡。\\n請於營業時間前往櫃檯辦理。"""

    # 搜尋地區或店名
    target_stores = []
    # 支援搜尋 桃園, 台中, 高雄 等大地區
    for s in STORES_DB:
        if any(word in s['area'].lower() for word in ui.split()) or \
           any(word in s['name'].lower() for word in ui.split()):
            target_stores.append(s)

    if target_stores:
        res = "🔍 **為您找到相關據點資訊：**\\n\\n"
        # 條列店名
        names = [s['name'] for s in target_stores]
        res += "📍 包含據點：" + "、".join(names) + "\\n\\n---\\n\\n"
        # 顯示詳情
        for s in target_stores:
            res += f"🏠 **{s['name']}**\\n"
            res += f"📍 **地址**: {s.get('addr', '請洽詢')}\\n"
            res += f"🅿️ **停車**: {s.get('parking', '臨停卸貨')}\\n"
            res += f"🛗 **電梯**: {s.get('elevator', '推車搬運')}\\n"
            res += f"🚇 **交通**: {s.get('transit', '請參閱地圖')}\\n\\n"
        return res

    return "🤖 您好！您可以輸入**地區或店名**(如: 桃園、台中、高雄、新店) 或詢問 **如何租倉、停車資訊、貨梯設備**。"

# --- 3. 介面呈現 ---
with st.sidebar:
    st.markdown("### 🏢 收多易全台管家")
    st.info("已導入全台據點 (基隆、桃園、新竹、台中、台南、高雄) 深度資料。")
    st.markdown("[📊 線上租倉評估](https://3-dstorage.vercel.app)")

st.title("🧡 收多易客服小幫手")

if "messages" not in st.session_state:
    st.session_state.messages = []

for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.markdown(msg["content"])

if prompt := st.chat_input("請輸入地區、店名 (例如：桃園店、台中停車、高雄資訊...)"):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    with st.chat_message("assistant"):
        ans = handle_query(prompt)
        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
`
        }
      }, document.getElementById("root")).then(() => {
        document.getElementById('loading-msg').style.display = 'none';
      });
