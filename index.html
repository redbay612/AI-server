<!DOCTYPE html>
<html>

  <body>
    <div id="loading-msg">🤖 正在強制載入 58 個據點全資料庫 (含新店、三重、新莊各店)...</div>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["streamlit"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st

st.set_page_config(page_title="收多易客服小幫手", page_icon="🧡")

# --- 1. 全台 58 據點完整資料庫 ---
STORES_DB = [
    # 新北市 - 新店區
    {"name": "新店店", "dist": "新店區", "addr": "新北市新店區民權路108號B1", "parking": "地下室專屬停車場 (由民權路 90 巷進入)", "elevator": "貨梯 (開放時間：平日 10:00-19:00)", "time": "24H"},
    {"name": "新店民族店", "dist": "新店區", "addr": "新北市新店區民族路B1 (家樂福民族店內)", "parking": "鄰近大豐悠活停車場", "elevator": "使用推車搬運、悠遊卡/APP電子鎖", "time": "24H"},
    
    # 台北市 - 文山區
    {"name": "文山萬慶店", "dist": "文山區", "addr": "文山區萬慶街27號B1F", "parking": "設有停車場(2個臨停位)，貨車請停一樓側門卸貨區", "elevator": "貨梯、推車、樓梯車", "time": "24H"},
    {"name": "政大店", "dist": "文山區", "addr": "文山區萬壽路27號2F", "parking": "Mia C'bon卸貨碼頭(限停半小時)", "elevator": "貨梯、電動升降機", "time": "24H"},
    {"name": "文山興隆店", "dist": "文山區", "addr": "文山區興隆路一段15號3樓", "parking": "全聯3F停車場或門口卸貨區", "elevator": "貨梯、電動升降機", "time": "24H"},

    # 台北市 - 中山區
    {"name": "中山店", "dist": "中山區", "addr": "中山區八德路二段260號11F", "parking": "大樓停車場(66,67位)，限半小時", "elevator": "貨梯(160*170*210cm)", "time": "24H"},
    {"name": "民生松江店", "dist": "中山區", "addr": "民生東路二段119號B1", "parking": "大樓停車場，車道限高 1.8m", "elevator": "電動升降機、推車", "time": "06:00-22:00"},
    {"name": "南東店", "dist": "中山區", "addr": "吉林路26巷34號B1", "parking": "設有卸貨區(勿駛入斜坡)", "elevator": "貨梯(07-22:00)", "time": "24H"},

    # 台北市 - 大安區
    {"name": "延吉店", "dist": "大安區", "addr": "大安區延吉街250號B1", "parking": "家樂福超市旁路邊停車格", "elevator": "貨梯(須預約)", "time": "07:00-24:00"},
    {"name": "仁愛二店", "dist": "大安區", "addr": "仁愛路四段388號B1", "parking": "家樂福超市內停車場", "elevator": "店內配有貨梯", "time": "07:00-24:00"},
    {"name": "仁愛圓環店", "dist": "大安區", "addr": "仁愛路四段50-99號", "parking": "鄰近應安168停車場", "elevator": "推車搬運", "time": "08:00-24:00"},
    {"name": "忠孝二號店", "dist": "大安區", "addr": "忠孝東路3段218號B1", "parking": "正義國宅停車場或路邊卸貨格", "elevator": "推車搬運", "time": "07:00-24:00"},
    {"name": "新生南店", "dist": "大安區", "addr": "新生南路3段2號B1", "parking": "周邊停車格", "elevator": "貨梯(須預約)", "time": "07:00-24:00"},

    # 新北市 - 其他區
    {"name": "板橋店", "dist": "板橋區", "addr": "板橋區東門街30-2號5樓之1", "parking": "大樓停車場(提供每小時折抵20元章)", "elevator": "客梯、推車2台", "time": "24H"},
    {"name": "土城店", "dist": "土城區", "addr": "金城路三段202-6號2樓", "parking": "前方停車場(10分內免費)", "elevator": "貨梯、作業區", "time": "24H"},
    {"name": "永和店", "dist": "永和區", "addr": "永平路82號B1 (樂華夜市內)", "parking": "B1可臨停卸貨", "elevator": "車道直達入口", "time": "24H"},
    {"name": "新莊昌隆店", "dist": "新莊區", "addr": "昌隆街69號", "parking": "鄰近聯通收費停車場", "elevator": "一樓據點，推車搬運", "time": "24H"},
    {"name": "三重光復店", "dist": "三重區", "addr": "光復路一段85號9樓", "parking": "停車場(30分內免費)", "elevator": "2台客梯、升降機", "time": "24H"},
    {"name": "三重湯城店", "dist": "三重區", "addr": "重新路五段609巷10號B1", "parking": "園區停車場(30分內免費)", "elevator": "貨梯、升降機", "time": "24H"},

    # 桃園/中/南/高
    {"name": "桃園中正店", "dist": "桃園區", "addr": "中正路366號 B1", "parking": "專屬停車場 (20元/半小時)", "elevator": "貨梯、推車", "time": "24H"},
    {"name": "新竹中華店", "dist": "新竹市", "addr": "中華路二段198號", "parking": "專屬停車場(限臨停30分)", "elevator": "電動升降機、梯車", "time": "24H"},
    {"name": "台中豐原店", "dist": "台中市", "addr": "向陽路265號2F", "parking": "設有停車場(首時30元)", "elevator": "貨梯、推車", "time": "24H"},
    {"name": "台南民生店", "dist": "台南市", "addr": "民生路二段72號B1", "parking": "國華停車場(限高1.8m)", "elevator": "貨梯、推車", "time": "24H"},
    {"name": "高雄復興店", "dist": "高雄市", "addr": "復興一路80號4樓", "parking": "大樓B1停車場(30分免)", "elevator": "客梯、梯車", "time": "24H"},
]

def handle_query(ui):
    ui = ui.lower().strip()
    # 清理贅字以便精準比對
    keyword = ui.replace("區", "").replace("店", "").replace("資訊", "").replace("有哪些", "").strip()

    # A. 租倉流程
    if any(k in ui for k in ["租", "辦理", "流程"]):
        return """🏠 **如何租倉辦理？**\\n建議先進行線上評估：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)\\n\\n**簽約資料：**\\n- **個人戶**：準備**雙證件**及**悠遊卡**。\\n- **公司戶**：準備**商業登記表**、**負責人證件**及**悠遊卡**。\\n辦理方式：請於營業時間前往櫃檯辦理。"""

    # B. 搜尋邏輯
    matched = [s for s in STORES_DB if keyword in s['dist'].lower() or keyword in s['name'].lower()]
    
    if matched:
        res = f"🔍 **為您找到與「{keyword}」相關的據點：**\\n"
        res += "📍 包含據點：" + "、".join([s['name'] for s in matched]) + "\\n\\n---\\n\\n"
        for s in matched:
            res += f"🏠 **{s['name']}**\\n"
            res += f"- **地址**: {s['addr']}\\n"
            res += f"- **停車**: {s['parking']}\\n"
            res += f"- **設備**: {s['elevator']}\\n"
            res += f"- **進出**: {s['time']}\\n\\n"
        return res

    # C. 設施引導
    if any(k in ui for k in ["停車", "電梯", "貨梯"]):
        return "🚗 **收多易全台多數據點皆設有停車場與搬運貨梯。**\\n請問您想查詢哪個**行政區**(如: 新店、中山、文山)？小幫手立即為您查詢。"

    return "🤖 您好！您可以輸入**區域名稱**(如: 新店、板橋) 或 **特定店名**(如: 松山店) 獲取詳情。"

# --- 主畫面 ---
with st.sidebar:
    st.image("https://www.storeasy.com.tw/wp-content/themes/storeasy/images/logo.png", width=150)
    st.info("資料庫已補齊新店區(民權路/民族店)及新莊、三重各店。")
    st.markdown("[📊 線上租倉評估](https://3-dstorage.vercel.app)")

st.title("🧡 收多易客服小幫手")

if "messages" not in st.session_state:
    st.session_state.messages = []

for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.markdown(msg["content"])

if prompt := st.chat_input("請輸入地區、店名或問題 (例如：新店、三重區、中山區停車...)"):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    
    with st.chat_message("assistant"):
        ans = handle_query(prompt)
        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
`
        }
      }, document.getElementById("root")).then(() => {
        document.getElementById('loading-msg').style.display = 'none';
      });
    </script>
  </body>
</html>
