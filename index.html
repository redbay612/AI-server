    {"name": "內湖家樂福店", "area": "內湖區,台北市", "addr": "內湖區民善街88號4F", "parking": "家樂福 B1/1F 停車場 (可與店長領 1H 折抵券)", "elevator": "配有貨梯", "transit": "新湖民善街口步行3分"},

    {"name": "南港興華店", "area": "南港區,台北市", "addr": "南港路二段20巷5號B2", "parking": "全聯 B2 停車場 (80元/時)", "elevator": "客用電梯、推車(2台)", "transit": "南港站步行5分"},

    {"name": "中和威力店", "area": "中和區,新北市", "addr": "中和區中山路二段291號6樓", "parking": "家樂福停車場，車可直達 6 樓 (前30分免費)", "elevator": "配有貨梯", "transit": "中和站步行2分鐘"},

    # 桃園、台中、高雄、新竹
    {"name": "桃園經國店", "area": "桃園市", "addr": "桃園區經國路369號", "parking": "家樂福停車場 (30元/時)", "elevator": "配有貨梯", "transit": "敏盛醫院站步行2分"},

    {"name": "新竹中華店", "area": "新竹市", "addr": "東區中華路二段198號", "parking": "專屬停車場/卸貨區 (限臨停30分)", "elevator": "貨梯、電動升降機、梯車", "transit": "國賓大飯店站即抵達"},
    {"name": "高雄復興店", "area": "高雄市", "addr": "新興區復興一路80號4樓", "parking": "B1 停車場 (目前前30分免費)", "elevator": "客梯 (車廂 140*150*220cm)", "transit": "美麗島站步行12分"},
    {"name": "高雄博愛店", "area": "高雄市", "addr": "三民區博愛一路372號9樓", "parking": "鄰近松江街停車場", "elevator": "配有客梯", "transit": "後驛站3號出口步行5分"}
]

# --- 2. 核心搜尋與回覆邏輯 ---
def handle_query(ui):
    ui = ui.lower().replace("店", "").strip()
    
    # A. 租倉手續
    if any(k in ui for k in ["租", "如何租", "辦理", "承租"]):
        return """🏠 **如何租倉辦理？**
建議先進行線上評估獲取推薦空間：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)

**簽約準備資料：**
- **個人戶**：請準備**雙證件**及**悠遊卡**。
- **公司戶**：請準備**商業登記表**、**負責人證件**及**悠遊卡**。

**辦理方式：**
請於營業時間前往櫃檯辦理簽約登記。"""

    # B. 通用設施引導 (停車、電梯)
    is_asking_parking = any(k in ui for k in ["停車", "車位", "卸貨"])
    is_asking_elevator = any(k in ui for k in ["電梯", "貨梯", "搬運"])
    
    # C. 地區與據點匹配 (智慧檢索)
    matched_stores = []
    # 建立一個區域列表用於快速匹配
    all_areas = ["士林", "內湖", "南港", "中山", "大安", "中正", "萬華", "信義", "中和", "板橋", "新店", "三重", "土城", "桃園", "台中", "新竹", "高雄", "基隆", "台南"]
    
    current_area_match = None
    for area in all_areas:
        if area in ui:
            current_area_match = area
            break
            
    # 如果用戶輸入了地區
    if current_area_match:
        matched_stores = [s for s in WMS_DB if current_area_match in s['area'] or current_area_match in s['name']]
    else:
        # 否則檢查是否包含特定店名
        for s in WMS_DB:
            if ui in s['name'].lower():
                matched_stores.append(s)

    # D. 回覆邏輯
    if matched_stores:
        res = ""
        # 情況 1: 問特定設施但沒指名地區 (雖然匹配到了，但如果是通用詢問則引導)
        # 這裡我們選擇直接列出匹配到的地區資訊
        
        # 1. 條列清單
        store_names = [s['name'] for s in matched_stores]
        res += f"📍 **為您找到以下據點：**\\n" + "、".join(store_names) + "\\n\\n---\\n\\n"
        
        # 2. 顯示詳情
        for s in matched_stores:
            res += f"🏠 **{s['name']}**\\n"
            res += f"- **地址**: {s.get('addr', '請洽詢')}\\n"
            res += f"- **停車**: {s.get('parking', '請洽詢')}\\n"
            res += f"- **設備**: {s.get('elevator', '請洽詢')}\\n"
            res += f"- **交通**: {s.get('transit', '請參閱地圖')}\\n\\n"
        return res

    # 情況 E: 沒提地區只問停車/電梯
    if is_asking_parking:
        return "🚗 **收多易全台多數據點皆設有停車場或鄰近停車位。**\\n請問您想查詢哪個**區域**(如: 內湖區、南港區) 或特定的**據點**？小幫手再為您提供詳細停車資訊。"
    
    if is_asking_elevator:
        return "🛗 **收多易全台多數據點皆配有貨梯或客梯方便搬運。**\\n請問您想查詢哪個**區域**(如: 士林區、中山區) 或特定的**據點？**"

    return "🤖 您好！您可以輸入**地區或店名**(如: 內湖、桃園、南港) 或詢問 **如何租倉、停車資訊、貨梯設備**。"

# --- 3. 介面呈現 ---
with st.sidebar:
    st.image("https://www.storeasy.com.tw/wp-content/themes/storeasy/images/logo.png", width=150)
    st.info("已完成全台 40+ 據點資料校對。\\n支援地區模糊搜尋。")
    st.markdown("[📊 線上租倉評估](https://3-dstorage.vercel.app)")

st.title("🧡 收多易客服小幫手")

if "messages" not in st.session_state:
    st.session_state.messages = []

for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.markdown(msg["content"])

if prompt := st.chat_input("請輸入地區、店名或問題..."):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    
    with st.chat_message("assistant"):
        ans = handle_query(prompt)
        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
`
        }
      }, document.getElementById("root")).then(() => {
        document.getElementById('loading-msg').style.display = 'none';
      });
    </script>
