<!DOCTYPE html>

        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;

    <div id="loading-msg">🤖 正在導入最新據點詳情（含周邊寄貨與代收限制）...</div>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["streamlit"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st

st.set_page_config(page_title="收多易客服小幫手", page_icon="🧡")

# --- 1. 全台深度整合資料庫 ---
STORES_DB = [
    {"name": "新竹中華店", "area": "新竹市", "parking": "專屬停車場/卸貨區 (東區民權路24巷1號)，限臨停 30 分鐘", "elevator": "推車、梯車、電動升降機、車道直達據點", "addr": "新竹市東區中華路二段198號", "time": "24H", "pkg": "代收包裹: 有 (三邊總合 <= 200cm)", "box": "紙箱販售: 有 (小45/中55/大65)", "nearby": "步行1分內：蝦皮店到店、7-11、全家、萊爾富"},
    {"name": "台中豐原店", "area": "台中市", "parking": "設有停車場 (第1小時30元，續時15元/時)", "elevator": "配有貨梯及 1 台推車", "addr": "台中市豐原區向陽路265號2F", "time": "24H", "pkg": "代收包裹: 有 (三邊總合 <= 200cm)", "box": "紙箱販售: 有 (小45/中55/大65)", "nearby": "步行1分內：7-11門市"},
    {"name": "台中青海店", "area": "台中市", "parking": "家樂福 B2/3F/4F 停車場 (40元/時，可消費折抵)", "elevator": "配有貨梯及 1 台推車", "addr": "台中市西屯區青海路二段207-18號B1", "time": "10:00 - 22:00", "pkg": "代收包裹: 無", "box": "紙箱販售: 無", "nearby": "步行3分內：全家、7-11"},
    {"name": "天母圓環店", "area": "士林區", "parking": "大樓設有停車場 (08:00-10:30 提供1H折抵券)", "elevator": "配有貨梯、推車、梯車", "addr": "士林區中山北路七段154巷6號2樓", "time": "24H", "pkg": "代收包裹: 有 (三邊總合 <= 200cm)", "box": "紙箱販售: 有 (小45/中55/大65)", "nearby": "步行1分內：全家、7-11"},
    {"name": "南東店", "area": "中山區", "parking": "設有卸貨區 (請平停於斜坡上勿駛入)", "elevator": "貨梯 (開放 07:00-22:00)、推車、摺疊梯", "addr": "中山區吉林路26巷34號B1", "time": "24H", "pkg": "代收包裹: 有 (三邊總合 <= 200cm)", "box": "紙箱販售: 有 (小45/中55/大65)", "nearby": "步行1分內：全家、7-11"},
    {"name": "台北車站店", "area": "中正區", "parking": "許昌街停車場 B4/B5 (70元/時)", "elevator": "設有客用電梯及 2 台推車", "addr": "中正區忠孝西路一段50號B1", "time": "24H", "pkg": "代收包裹: 無", "box": "紙箱販售: 有 (小45/中55/大65)", "nearby": "步行5分內：全家、7-11"},
    {"name": "南港興華店", "area": "南港區", "parking": "全聯 B2 停車場 (80元/時)，車道限高 180cm", "elevator": "設有客用電梯及 2 台推車", "addr": "南港區南港路二段20巷5號B2", "time": "08:00 - 23:00", "pkg": "代收包裹: 有 (三邊總合 <= 200cm)", "box": "紙箱販售: 有 (小45/中55/大65)", "nearby": "步行1分內：蝦皮店到店、郵局"},
    {"name": "政大店", "area": "文山區", "parking": "超市卸貨碼頭 (限臨停30分，09:00-21:00)", "elevator": "配有貨梯、推車、梯車、電動升降機", "addr": "文山區萬壽路27號2F", "time": "24H (前門)", "pkg": "代收包裹: 有", "box": "紙箱販售: 有 (小45/中55/大65)", "nearby": "步行5分內：蝦皮、7-11、全家、郵局"},
    {"name": "逸仙店", "area": "信義區", "parking": "7號入口可臨停下貨，或停國父紀念館停車場 (40元/時)", "elevator": "配有貨梯、推車、電動升降機、梯車", "addr": "信義區逸仙路26巷1號B1", "time": "24H", "pkg": "代收包裹: 有", "box": "紙箱販售: 有 (小45/中55/大65)", "nearby": "步行1分內：全家、7-11"}
]

# --- 2. 核心搜尋邏輯 ---
def handle_query(ui):
    ui = ui.lower().strip()
    
    # 租倉流程 (依照客戶最新要求)
    if any(k in ui for k in ["租", "辦理", "承租", "流程", "想租"]):
        return """🏠 **如何租倉辦理？**\\n建議先進行線上評估：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)\\n\\n**簽約準備資料：**\\n- **個人戶**：請準備**雙證件**及**悠遊卡**。\\n- **公司戶**：請準備**商業登記表**、**負責人證件**及**悠遊卡**。\\n**辦理方式：** 請於營業時間前往櫃檯辦理。"""

    # 紙箱與包裹
    if any(k in ui for k in ["紙箱", "購買", "包裹", "代收"]):
        for s in STORES_DB:
            if s['name'].replace("店","") in ui:
                return f"📦 **{s['name']} 服務資訊：**\\n- {s['box']}\\n- {s['pkg']}"
        return "📦 **收多易紙箱價格**：小45元、中55元、大65元。\\n包裹代收通常需遵守三邊總合 $\\\\le$ 200 cm 之限制。請問您想詢問哪間分店？"

    # 周邊環境 (蝦皮、超商)
    if any(k in ui for k in ["蝦皮", "7-11", "便利商店", "寄貨", "附近"]):
        for s in STORES_DB:
            if s['name'].replace("店","") in ui:
                return f"🏪 **{s['name']} 周邊生活機能：**\\n{s['nearby']}"
        return "🏪 請問您想查詢哪個據點周邊的便利商店或寄貨據點？"

    # 地區、店名與設施深度搜尋
    target_stores = []
    for s in STORES_DB:
        if s['name'].replace("店","").lower() in ui or s['area'].lower() in ui:
            target_stores.append(s)

    if target_stores:
        res = "🔍 **為您找到相關據點資訊：**\\n\\n"
        for s in target_stores:
            res += f"🏠 **{s['name']}**\\n"
            res += f"📍 地址: {s.get('addr', '請洽詢')}\\n"
            res += f"🅿️ 停車: {s.get('parking', '臨停卸貨')}\\n"
            res += f"🛗 電梯: {s.get('elevator', '推車搬運')}\\n"
            res += f"🕒 存取時間: {s.get('time', '請見官網')}\\n"
            res += f"🏪 周邊: {s.get('nearby', '超商及郵局')}\\n\\n---\\n"
        return res

    return "🤖 您好！您可以輸入**地區或店名**(如: 南港、新竹、逸仙店) 或詢問 **紙箱價格、蝦皮寄貨、代收包裹**。"

# --- 3. 介面呈現 ---
with st.sidebar:
    st.markdown("### 🏢 收多易深度管家")
    st.info("已導入新竹、台中及雙北據點之最新費率、包裹尺寸及周邊便利性資訊。")
    st.markdown("[📊 線上租倉評估](https://3-dstorage.vercel.app)")

st.title("🧡 收多易客服小幫手")

if "messages" not in st.session_state:
    st.session_state.messages = []

for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.markdown(msg["content"])

if prompt := st.chat_input("例如：新竹店停車、政大附近有蝦皮嗎？紙箱多少錢？"):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    with st.chat_message("assistant"):
        ans = handle_query(prompt)
        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
`
        }
      }, document.getElementById("root")).then(() => {
        document.getElementById('loading-msg').style.display = 'none';
      });
    </script>
  </body>
</html>
