<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>收多易客服小幫手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css" />
    <style>
      #loading-msg {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="loading-msg">🤖 正在優化區域檢索與設施引導邏輯...</div>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["streamlit"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st

st.set_page_config(page_title="收多易客服小幫手", page_icon="🧡")

# --- 1. 全量據點完整資料庫 ---
# 增加 area_key 欄位用於分區條列
WMS_DB = [
    {"name": "士林劍潭店", "area_key": "士林區", "addr": "士林區承德路四段179巷7號", "parking": "收費停車場及專屬車位 (上班時間可消磁1H)", "equip": "簡易載貨平台、推車(2台)", "time": "24H"},
    {"name": "天母圓環店", "area_key": "士林區", "addr": "士林區中山北路七段154巷6號2樓", "parking": "大樓停車場 (08:00-10:30 提供折抵券)", "equip": "貨梯、推車(2台)、梯車", "time": "24H"},
    {"name": "天母廣場店", "area_key": "士林區", "addr": "士林區天母西路3號2樓", "parking": "大樓停車場 (40元/時)", "equip": "客用電梯、推車(1台)", "time": "08:00-24:00"},
    {"name": "天母德行店", "area_key": "士林區", "addr": "士林區德行西路47號B1", "parking": "家樂福B1停車場 (車道直達)", "equip": "推車(1台)", "time": "08:00-23:00"},
    {"name": "三重湯城店", "area_key": "三重區", "addr": "三重重新路五段609巷10號B1", "parking": "湯城園區停車場 (前30分免費)", "equip": "貨梯、推車(1台)", "time": "24H"},
    {"name": "三重光復店", "area_key": "三重區", "addr": "三重區光復路", "parking": "據點設有停車場 (前30分免費)", "equip": "2台客用電梯", "time": "24H"},
    {"name": "中和威力店", "area_key": "中和區", "addr": "中和區中山路二段291號6樓", "parking": "家樂福停車場 (車可直達6樓)", "equip": "貨梯、推車(1台)", "time": "08:00-24:00"},
    {"name": "新店店", "area_key": "新店區", "addr": "新店區民權路108號B1", "parking": "由民權路90巷進入B1停車場", "equip": "貨梯 (平日 10-19)", "time": "24H"},
    {"name": "松山店", "area_key": "松山區", "addr": "南港區八德路四段768巷5號2F-1", "parking": "大樓 B2 專屬位 (27, 33, 41 號)", "equip": "貨梯(160*170*210cm)", "time": "24H"},
    {"name": "民生松江店", "area_key": "中山區", "addr": "中山區民生東路二段119號B1", "parking": "大樓停車場 (車道限高 1.8m)", "equip": "電動升降機、推車", "time": "06:00-22:00"},
]

# --- 2. 核心邏輯處理 ---
def handle_query(ui):
    ui = ui.lower().strip()
    
    # 租倉流程 (固定回覆)
    if any(k in ui for k in ["租", "如何租", "承租"]):
        return """🏠 **如何租倉辦理？**
建議先進行線上評估：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)

**簽約準備資料：**
- **個人戶**：請準備**雙證件**及**悠遊卡**。
- **公司戶**：請準備**商業登記表**、**負責人證件**及**悠遊卡**。

**辦理方式：**
請於營業時間前往櫃檯辦理簽約登記。"""

    # 設施通用詢問引導 (停車位/貨梯/電梯)
    is_asking_parking = any(k in ui for k in ["停車", "車位", "卸貨"])
    is_asking_elevator = any(k in ui for k in ["電梯", "貨梯", "搬運"])
    
    # 檢查是否提到特定區域或據點
    target_area = None
    target_store = None
    
    # 提取用戶輸入中的區域或店名
    all_areas = list(set([s['area_key'] for s in WMS_DB]))
    for area in all_areas:
        if area.replace("區","") in ui:
            target_area = area
            break
            
    for s in WMS_DB:
        if s['name'].replace("店","") in ui:
            target_store = s['name']
            break

    # 邏輯 A: 僅問設施，沒提地點 -> 引導詢問
    if (is_asking_parking or is_asking_elevator) and not (target_area or target_store):
        facility = "停車位" if is_asking_parking else "貨梯/搬運設備"
        return f"🚗 **收多易全台多數據點皆設有{facility}。**\\n\\n請問您是想查詢哪個**區域**（如：士林區、中和區）或是特定的**據點**？小幫手再為您提供該據點的詳細資訊。"

    # 邏輯 B: 詢問特定區域 -> 先條列清單，再給詳情
    if target_area:
        stores_in_area = [s for s in WMS_DB if s['area_key'] == target_area]
        store_names = [s['name'] for s in stores_in_area]
        
        res = f"📍 **{target_area}據點包含：**\\n"
        res += "、".join(store_names) + "\\n\\n"
        res += "--- **據點詳細資訊如下** ---\\n\\n"
        
        for s in stores_in_area:
            res += f"🏠 **{s['name']}**\\n"
            res += f"- **地址**: {s['addr']}\\n"
            res += f"- **停車**: {s['parking']}\\n"
            res += f"- **設備**: {s['equip']}\\n"
            res += f"- **進出**: {s['time']}\\n\\n"
        return res

    # 邏輯 C: 詢問特定店名
    if target_store:
        s = next(item for item in WMS_DB if item["name"] == target_store)
        return f"""🏠 **{s['name']} 資訊**
📍 **地址**: {s['addr']}
🅿️ **停車**: {s['parking']}
🛗 **設備**: {s['equip']}
🕒 **進出**: {s['time']}"""

    # 邏輯 D: 通用查詢 (營登)
    if any(k in ui for k in ["營登", "營業登記"]):
        return "🏢 **提供營登服務的據點：**\\n松山、台北車站、南門、士林劍潭、板橋、新店、桃園中正、新竹、台中中港店。"

    return "🤖 您好！您可以輸入**區域名稱**(如: 士林、三重) 或詢問 **如何租倉、據點停車資訊、貨梯設備**。"

# --- 3. 介面呈現 ---
with st.sidebar:
    st.markdown("### 🏢 收多易智能客服")
    st.info("已優化區域據點檢索與設施詢問引導邏輯。")
    st.markdown("[📊 線上租倉評估](https://3-dstorage.vercel.app)")

st.title("🧡 收多易客服小幫手")

if "messages" not in st.session_state:
    st.session_state.messages = []

for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.markdown(msg["content"])

if prompt := st.chat_input("請輸入地區、店名或問題 (例如：士林區、停車位、如何租倉...)"):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    
    with st.chat_message("assistant"):
        ans = handle_query(prompt)
        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
`
        }
      }, document.getElementById("root")).then(() => {
        document.getElementById('loading-msg').style.display = 'none';
      });
    </script>
  </body>
</html>
