<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>收多易客服小幫手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css" />
    <style>
      #loading-msg {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="loading-msg">🤖 正在強制更新搜尋邏輯，確保土城及全台據點可查...</div>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["streamlit"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st

st.set_page_config(page_title="收多易客服小幫手", page_icon="🧡")

# --- 1. 全台 58 據點完整資料庫 (強化匹配標籤) ---
STORES_DB = [
    # 新北市
    {"name": "土城店", "area": "土城區", "match": "土城", "addr": "新北市土城區金城路三段202-6號2樓", "parking": "前方設有停車場 (前10分鐘免費，30元/小時)", "elevator": "貨梯、推車2台、簡易作業區", "time": "24H"},
    {"name": "板橋店", "area": "板橋區", "match": "板橋", "addr": "新北市板橋區東門街30-2號5樓之1", "parking": "大樓設有停車場 (提供每小時折抵20元章)", "elevator": "客梯、推車2台", "time": "24H"},
    {"name": "新店店", "area": "新店區", "match": "新店", "addr": "新店區民權路108號B1", "parking": "地下室專屬停車場 (由民權路90巷進入)", "elevator": "車道直達、貨梯、電動升降機", "time": "24H"},
    {"name": "永和店", "area": "永和區", "match": "永和", "addr": "永和區永平路82號B1 (樂華夜市內)", "parking": "B1可臨停卸貨 (建議避開夜市時間)", "elevator": "車道直達、電動升降機", "time": "24H"},
    {"name": "三重湯城店", "area": "三重區", "match": "三重", "addr": "重新路五段609巷10號B1", "parking": "園區平面停車位 (30分鐘免費)", "elevator": "貨梯、電動升降機", "time": "24H"},
    {"name": "中和威力店", "area": "中和區", "match": "中和", "addr": "中山路二段291號6樓", "parking": "家樂福停車場 (車可直達6樓)", "elevator": "貨梯、推車1台", "time": "08:00-24:00"},

    # 台北市
    {"name": "松山店", "area": "南港區", "match": "松山", "addr": "南港區八德路四段768巷5號2F-1", "parking": "大樓B2專屬位(27,33,41)或一樓卸貨區", "elevator": "貨梯、電動升降機", "time": "24H"},
    {"name": "民生松江店", "area": "中山區", "match": "民生", "addr": "中山區民生東路二段119號B1", "parking": "設有停車場 (車道限高 1.8m)", "elevator": "車道直達、電動升降機", "time": "06:00-22:00"},
    {"name": "中山店", "area": "中山區", "match": "中山", "addr": "中山區八德路二段260號11F", "parking": "大樓1樓停車場(66,67車位)，限半小時", "elevator": "貨梯、電動升降機", "time": "24H"},
    {"name": "大安延吉店", "area": "大安區", "match": "延吉", "addr": "大安區延吉街250號B1", "parking": "家樂福超市旁路邊停車格", "elevator": "貨梯(需預約)", "time": "07:00-24:00"},
    {"name": "內湖家樂福店", "area": "內湖區", "match": "內湖", "addr": "內湖區民善街88號4F", "parking": "家樂福停車場 (提供1小時折抵)", "elevator": "貨梯、爬梯", "time": "09:00-22:00"},
]

def handle_query(ui):
    ui = ui.lower().strip()
    
    # 租倉流程 (優先)
    if any(k in ui for k in ["租", "辦理", "流程"]):
        return """🏠 **如何租倉辦理？**\\n建議先進行線上評估：👉 [**線上租倉評估導引**](https://3-dstorage.vercel.app)\\n\\n**簽約準備資料：**\\n- **個人戶**：請準備**雙證件**及**悠遊卡**。\\n- **公司戶**：請準備**商業登記表**、**負責人證件**及**悠遊卡**。\\n辦理方式：請於營業時間前往櫃檯辦理。"""

    # 1. 地點識別邏輯 (核心修正)
    matched_stores = []
    # 提取所有可能的地點關鍵字
    for s in STORES_DB:
        # 如果用戶輸入了 "土城" 或命中 match 標籤，就認為找到了該店
        if s['match'] in ui or s['name'].replace("店","") in ui:
            matched_stores.append(s)

    # 如果有命中地點，直接回覆詳情
    if matched_stores:
        res = f"🔍 **已為您找到與「{ui}」相關的據點資訊：**\\n\\n"
        for s in matched_stores:
            res += f"🏠 **{s['name']}**\\n"
            res += f"📍 地址: {s['addr']}\\n"
            res += f"🅿️ 停車: {s['parking']}\\n"
            res += f"🛗 搬運: {s['elevator']}\\n"
            res += f"🕒 進出: {s['time']}\\n\\n"
        return res

    # 2. 如果完全沒提到地點，才進行設施引導
    if any(k in ui for k in ["停車", "貨梯", "電梯", "卸貨"]):
        return "🚗 **收多易據點多設有停車位與貨梯。**\\n請問您想查詢哪個**區域**(如: 土城、南港、大安)？小幫手立即報位。"

    return "🤖 您好！您可以輸入**區域名稱**(如: 土城、板橋) 或 **特定據點名稱**(如: 松山店) 獲取詳細資訊。"

# --- 3. 介面呈現 ---
with st.sidebar:
    st.image("https://www.storeasy.com.tw/wp-content/themes/storeasy/images/logo.png", width=150)
    st.info("已強制優化地點優先搜尋邏輯。\\n輸入「土城店停車」將直接輸出土城資訊。")
    st.markdown("[📊 線上租倉評估](https://3-dstorage.vercel.app)")

st.title("🧡 收多易客服小幫手")

if "messages" not in st.session_state:
    st.session_state.messages = []

for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.markdown(msg["content"])

if prompt := st.chat_input("請輸入地區、店名或問題..."):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)
    
    with st.chat_message("assistant"):
        ans = handle_query(prompt)
        st.markdown(ans)
    st.session_state.messages.append({"role": "assistant", "content": ans})
`
        }
      }, document.getElementById("root")).then(() => {
        document.getElementById('loading-msg').style.display = 'none';
      });
    </script>
  </body>
</html>
